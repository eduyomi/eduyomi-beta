<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributors | FREE-EDU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap');

        /* ── Transparent so parent page bleeds through the iframe ── */
        html { background: transparent !important; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
        }

        /* ══════════════════════════════════════
           CSS VARIABLE SETS  (dark = default)
        ══════════════════════════════════════ */
        :root {
            --c-text:             #cbd5e1;
            --c-text-dim:         #94a3b8;
            --c-card-bg:          rgba(255,255,255,0.03);
            --c-card-border:      rgba(255,255,255,0.08);
            --c-card-shadow:      none;
            --c-join-bg:          rgba(2,6,23,0.80);
            --c-join-border:      rgba(51,65,85,1);
            --c-avatar-bg:        #0f172a;
            --c-serial:           rgba(255,255,255,0.04);
            --c-footer-txt:       #334155;
            --c-footer-bdr:       rgba(51,65,85,1);
            --c-modal-overlay:    rgba(0,0,0,0.88);
            --c-modal-bg:         #09090b;
            --c-modal-border:     rgba(255,255,255,0.10);
            --c-modal-name:       #ffffff;
            --c-modal-serial:     rgba(255,255,255,0.03);
            --c-modal-close-bg:   #ffffff;
            --c-modal-close-txt:  #000000;
            --c-sub-role:         #94a3b8;
            --exit-accent:        #3a86ff;
        }

        /* Light mode overrides — toggled by JS via data-light="1" on <body> */
        body[data-light="1"] {
            --c-text:             #13111f;
            --c-text-dim:         #475569;
            --c-card-bg:          rgba(255,255,255,0.82);
            --c-card-border:      rgba(0,0,0,0.09);
            --c-card-shadow:      0 2px 14px rgba(0,0,0,0.07);
            --c-join-bg:          rgba(255,255,255,0.88);
            --c-join-border:      rgba(0,0,0,0.11);
            --c-avatar-bg:        #e2e8f0;
            --c-serial:           rgba(0,0,0,0.05);
            --c-footer-txt:       #94a3b8;
            --c-footer-bdr:       rgba(0,0,0,0.09);
            --c-modal-overlay:    rgba(180,180,195,0.55);
            --c-modal-bg:         #ffffff;
            --c-modal-border:     rgba(0,0,0,0.10);
            --c-modal-name:       #13111f;
            --c-modal-serial:     rgba(0,0,0,0.04);
            --c-modal-close-bg:   #13111f;
            --c-modal-close-txt:  #ffffff;
            --c-sub-role:         #475569;
        }

        /* ── Plasma gradient text ── */
        @keyframes plasmaGradient {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .text-plasma {
            background: linear-gradient(-45deg, #ff17c6, #1cefff, #1aff7d, #ff17c6);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: plasmaGradient 10s ease infinite;
            transform: translate3d(0,0,0);
        }

        /* ── Join / Contribute box ── */
        .join-box {
            background:    var(--c-join-bg);
            border-color:  var(--c-join-border);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            transition: background 0.3s, border-color 0.3s;
        }
        .join-text-main { color: var(--c-text); transition: color 0.3s; }

        /* ── Contributor cards ── */
        .glass-card {
            background:    var(--c-card-bg);
            border:        1px solid var(--c-card-border);
            box-shadow:    var(--c-card-shadow);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.2s cubic-bezier(0.2,0,0.2,1),
                        background 0.3s, border-color 0.3s, box-shadow 0.3s;
            will-change: transform;
            position: relative;
            overflow: hidden;
        }
        .glass-card:active { transform: scale(0.96); }

        .card-name     { color: var(--c-text);     transition: color 0.3s; }
        .sub-text-small{ color: var(--c-sub-role)  !important; transition: color 0.3s; }
        .avatar-wrap   { background: var(--c-avatar-bg); transition: background 0.3s; }

        .serial-number {
            position: absolute; right: 4px; bottom: -8px;
            font-size: 52px; font-weight: 900;
            color: var(--c-serial);
            font-style: italic; pointer-events: none; z-index: 0;
            line-height: 1; letter-spacing: -0.05em;
            transition: color 0.3s;
        }

        .role-container {
            display: flex; flex-direction: column;
            gap: 1px; margin-top: 4px; line-height: 1.1;
            position: relative; z-index: 1;
        }

        #modalRole .role-badge-small { font-size: 15px !important; letter-spacing: 0.15em; }
        #modalRole .sub-text-small   { font-size: 12px !important; }

        /* ── Footer ── */
        footer {
            color: var(--c-footer-txt) !important;
            border-color: var(--c-footer-bdr) !important;
            transition: color 0.3s, border-color 0.3s;
        }

        /* ── Profile Modal ── */
        #profileModal {
            background: var(--c-modal-overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background 0.3s;
        }
        #modalContent {
            background:   var(--c-modal-bg)     !important;
            border-color: var(--c-modal-border) !important;
            transition: background 0.3s, border-color 0.3s;
        }
        .modal-serial {
            position: absolute; right: 15px; bottom: 65px;
            font-size: 110px; font-weight: 900;
            color: var(--c-modal-serial);
            font-style: italic; line-height: 1;
            pointer-events: none; z-index: 0;
            transition: color 0.3s;
        }
        #modalName {
            color: var(--c-modal-name) !important;
            transition: color 0.3s;
        }
        .modal-close-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin: 0 auto;
            padding: 11px 32px;
            border-radius: 999px;
            border: none;
            background: var(--c-modal-close-bg)  !important;
            color:      var(--c-modal-close-txt) !important;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, transform 0.15s, box-shadow 0.2s;
        }
        .modal-close-btn:hover  { transform: scale(1.05); box-shadow: 0 6px 22px rgba(0,0,0,0.22); }
        .modal-close-btn:active { transform: scale(0.97); }
        .modal-close-btn svg {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            flex-shrink: 0;
        }

        /* ── Fixed Exit Button ── */
        #fixed-exit-btn {
            position: fixed; bottom: 24px; right: 24px;
            z-index: 9999;
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--exit-accent);
            border: 2px solid rgba(255,255,255,0.18);
            box-shadow: 0 4px 20px rgba(0,0,0,0.30);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
        }
        #fixed-exit-btn:hover  { transform: scale(1.1); box-shadow: 0 6px 28px rgba(0,0,0,0.45); }
        #fixed-exit-btn:active { transform: scale(0.95); }
        #fixed-exit-btn svg {
            width: 20px; height: 20px;
            stroke: #fff; fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            .max-w-6xl { padding-top: 0.5rem !important; }
            .join-box  { margin-bottom: 1rem !important; padding: 1.25rem !important; }
            .contributor-grid { grid-template-columns: repeat(3,1fr) !important; gap: 8px !important; }
            .glass-card { padding: 8px 4px !important; border-radius: 12px !important; }
            .card-name        { font-size: 0.65rem !important; }
            .role-badge-small { font-size: 6px !important; }
            .sub-text-small   { font-size: 5.5px !important; }
            .serial-number    { font-size: 38px; bottom: -5px; }
            .modal-serial     { font-size: 80px; bottom: 85px; right: 10px; }
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-10">

<!-- Fixed Exit Button — always visible, never scrolls -->
<button id="fixed-exit-btn" onclick="window.parent.closePopup()" title="Close">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
</button>

<script>
/* ── Receive theme from parent index.html ── */
window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'eduyomi-theme') return;
    const d = e.data;
    /* One attribute flip triggers the entire CSS-var swap */
    document.body.dataset.light = d.isDark ? '0' : '1';
    /* Update exit button accent */
    if (d.accent) {
        document.documentElement.style.setProperty('--exit-accent', d.accent);
        document.getElementById('fixed-exit-btn').style.background = d.accent;
    }
});
</script>

<div class="max-w-6xl mx-auto px-4 pt-4">

    <!-- Contribute / Join box -->
    <div class="join-box mx-auto w-full lg:w-[35%] border backdrop-blur-2xl rounded-[2rem] p-5 mb-6 flex flex-col items-center gap-4 shadow-2xl">
        <div class="text-center">
            <h2 class="text-plasma text-[10px] font-black uppercase tracking-[0.4em] mb-1">Contribute</h2>
            <p class="join-text-main text-lg font-extrabold tracking-tighter">Add your profile♥️</p>
        </div>
        <div class="flex justify-center gap-3 w-full">
            <a href="#" class="flex-1 flex items-center justify-center gap-2 py-2.5 bg-emerald-600 text-white rounded-xl font-bold text-xs active:scale-95 transition-transform">
                <i class="fa-solid fa-table-cells"></i> Sheet
            </a>
            <a href="#" class="flex-1 flex items-center justify-center gap-2 py-2.5 bg-[#5865F2] hover:bg-[#4752C4] text-white rounded-xl font-bold text-xs active:scale-95 transition-transform">
                <i class="fa-brands fa-discord"></i> Discord
            </a>
            <a href="https://github.com/eduyomi/bmceco" class="flex-1 flex items-center justify-center gap-2 py-2.5 bg-white text-black rounded-xl font-bold text-xs active:scale-95 transition-transform">
                <i class="fa-brands fa-github"></i> GitHub
            </a>
        </div>
    </div>

    <!-- Contributor Grid -->
    <div class="contributor-grid grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-6">
        <script>
            const profiles = [
                { name: "Rahul",  role: "Lead Dev",    sub: "Core Engine",   img: "https://avatars.githubusercontent.com/u/279522844",      sNum: "01" },
                { name: "Sarah",  role: "Data Sci",    sub: "ML Researcher", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah",  sNum: "02" },
                { name: "Siam",   role: "Contributor", sub: "Backend Dev",   img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Siam",   sNum: "03" },
                { name: "Anika",  role: "UI Design",   sub: "Visual Art",    img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Anika",  sNum: "04" },
                { name: "Tanvir", role: "Tester",      sub: "QA Engineer",   img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Tanvir", sNum: "05" },
                { name: "Faria",  role: "Editor",      sub: "Content Lead",  img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Faria",  sNum: "06" },
                { name: "Zayan",  role: "DevOps",      sub: "Cloud Arch",    img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Zayan",  sNum: "07" },
                { name: "Nilo",   role: "Security",    sub: "Cyber Expert",  img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Nilo",   sNum: "08" },
                { name: "Ishat",  role: "Frontend",    sub: "React Dev",     img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Ishat",  sNum: "09" },
                { name: "Rifat",  role: "Support",     sub: "Community",     img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Rifat",  sNum: "10" }
            ];

            document.write(profiles.map(p => `
                <div class="glass-card px-4 py-3 rounded-2xl cursor-pointer text-center" onclick="openModal(this,'${p.sNum}')">
                    <div class="serial-number">${p.sNum}</div>
                    <div class="avatar-wrap overflow-hidden rounded-lg mb-2 mx-auto relative z-10">
                        <img src="${p.img}" class="w-full aspect-square object-cover" loading="lazy">
                    </div>
                    <h3 class="card-name font-bold text-sm tracking-tight relative z-10">${p.name}</h3>
                    <div class="role-container">
                        <span class="role-badge-small text-plasma block text-[8px] font-black uppercase tracking-widest">${p.role}</span>
                        <span class="sub-text-small block text-[7px] font-medium uppercase tracking-[0.1em]">${p.sub}</span>
                    </div>
                </div>
            `).join(''));
        </script>
    </div>

    <footer class="mt-16 py-8 border-t text-center text-[10px] tracking-widest uppercase">
        &copy; POWERED BY EDUYOMI • ALL RIGHTS RESOLVED 2026
    </footer>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="fixed inset-0 hidden items-center justify-center z-50 p-4" onclick="closeModal()">
    <div class="max-w-md w-full border p-8 rounded-3xl relative overflow-hidden transform transition-transform duration-300 scale-95"
         id="modalContent" onclick="event.stopPropagation()">
        <div id="modalSerial" class="modal-serial"></div>
        <img id="modalImg" src="" class="w-full aspect-square object-cover rounded-2xl mb-6 shadow-2xl relative z-10">
        <h2 id="modalName" class="text-3xl font-bold mb-1 tracking-tighter relative z-10"></h2>
        <div id="modalRole" class="mb-8 relative z-10"></div>
        <button onclick="closeModal()" class="modal-close-btn relative z-10">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Close
        </button>
    </div>
</div>

<script>
    function openModal(el, sNum) {
        const modal   = document.getElementById('profileModal');
        const content = document.getElementById('modalContent');

        document.getElementById('modalImg').src          = el.querySelector('img').src;
        document.getElementById('modalName').innerText   = el.querySelector('h3').innerText;
        document.getElementById('modalSerial').innerText = sNum;
        document.getElementById('modalRole').innerHTML   =
            `<div class="role-container">${el.querySelector('.role-container').innerHTML}</div>`;

        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => content.classList.add('scale-100'), 10);
        document.body.style.overflow = 'hidden';
        document.getElementById('fixed-exit-btn').style.display = 'none';
    }

    function closeModal() {
        const modal = document.getElementById('profileModal');
        document.getElementById('modalContent').classList.remove('scale-100');
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }, 200);
        document.getElementById('fixed-exit-btn').style.display = 'flex';
    }
</script>
</body>
</html>
